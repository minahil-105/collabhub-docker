
services:
  web:
    build: ./web
    container_name: web
    ports:
      - "3000:3000"
    networks:
      - collabhub-net

  api:
    build: ./api
    container_name: api
    ports:
      - "5000:5000"
    networks:
      - collabhub-net

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - web
      - api
    networks:
      - collabhub-net

networks:
  collabhub-net:
    driver: bridge
