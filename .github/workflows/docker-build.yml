name: Build and Push Docker Images

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build web image (local, not pushed yet)
        run: docker build -t collabhub-web-test ./web

      - name: Run web container for testing
        run: docker run -d -p 3000:3000 --name web-test collabhub-web-test

      - name: Wait for web to start
        run: sleep 3

      - name: Test web service
        run: curl --fail http://localhost:3000

      - name: Stop and remove web test container
        if: always()
        run: docker rm -f web-test

      - name: Build api image (local, not pushed yet)
        run: docker build -t collabhub-api-test ./api

      - name: Run api container for testing
        run: docker run -d -p 5000:5000 --name api-test collabhub-api-test

      - name: Wait for api to start
        run: sleep 3

      - name: Test api health endpoint
        run: curl --fail http://localhost:5000/api/health

      - name: Stop and remove api test container
        if: always()
        run: docker rm -f api-test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collabhub-web:latest

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collabhub-api:latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/collabhub-nginx:latest
